app = 'causa'
primary_region = 'nrt'

[build]
  builder = 'heroku/buildpacks:20'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"

[env]
  NODE_ENV = "production"
  PORT = "3000"
