services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: causa
      POSTGRES_USER: ${POSTGRES_USER:-causa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-causa_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-causa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  backtest:
    build:
      context: ./services/backtest
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8100/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-causa}:${POSTGRES_PASSWORD:-causa_dev}@postgres:5432/causa
      BACKTEST_SERVICE_URL: http://backtest:8100
      WEAVIATE_URL: http://weaviate:8080
      WEAVIATE_GRPC_HOST: weaviate
      WEAVIATE_GRPC_PORT: "50051"
      API_SECRET: ${API_SECRET:-}
      CRON_SECRET: ${CRON_SECRET:-}
      LLM_ENCRYPTION_KEY: ${LLM_ENCRYPTION_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      weaviate:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  pgdata:
  weaviate_data:
