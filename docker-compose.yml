version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: causa
      POSTGRES_USER: ${POSTGRES_USER:-causa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-causa_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-causa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backtest:
    build:
      context: ./services/backtest
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8100/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  pgdata:
